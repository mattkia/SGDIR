experiment_name: 'lpba_unet_deformable'

# data
data:
  name: 'lpba40'
  path: '../../Datasets/LPBA40'
  crop_x: 160
  crop_y: 144
  crop_z: 192

# network configs
model:
  model_type: 'unet'
  loss_type: 'ncc'
  architecture:
    down_channels: [16, 32, 64, 128, 512]
    up_channels: [512, 128, 64, 32, 16]
    decoder_only: true
    use_attention_gates: true
    use_se_attention: true
    time_emb_dim: 128

# training configs
training:
  batch_size: 1
  res_levels: 8
  lr: 1e-4
  epochs: 500
  eval_interval: 1
  checkpoints_path: 'checkpoints/lpba2.pt'
  logdir: 'logs/lpba40/lpba2.log'

# loss factors
loss:
  image_loss_coeff: 1.
  semigroup_coeff: 1e4

# evaluation configs
test:
  down_factor: 2
  save_evals: true
  save_evals_path: 'evals/lpba40/lpba2'
  logdir: 'logs/lpba40/lpba2_eval.log'
