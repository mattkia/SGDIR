experiment_name: 'candi_unet_deformable'

# data
data:
  name: 'candi'
  path: '../../Datasets/CANDI'
  crop_x: 160
  crop_y: 176
  crop_z: 144

# network configs
model:
  model_type: 'unet'
  loss_type: 'ncc'
  architecture:
    down_channels: [16, 32, 64, 128, 256]
    up_channels: [256, 128, 64, 32, 16]
    decoder_only: true
    use_attention_gates: true
    use_se_attention: true
    time_emb_dim: 128

# training configs
training:
  batch_size: 1
  res_levels: 4
  lr: 1e-4
  epochs: 1000
  eval_interval: 1
  checkpoints_path: 'checkpoints/candi2.pt'
  logdir: 'logs/candi/candi2.log'

# loss factors
loss:
  image_loss_coeff: 1.
  semigroup_coeff: 1e4

# evaluation configs
test:
  down_factor: 1
  save_evals: true
  save_evals_path: 'evals/candi/candi2'
  logdir: 'logs/candi/candi2_eval.log'
